services:
  mysql:
    platform: linux/x86_64
    image: mysql:8.0.31
    container_name: idolu-mysql
    ports:
      - "3306:3306"
    volumes:
      - ./init-docker/mysql/volume:/var/lib/mysql
      - ./init-docker/mysql/init:/docker-entrypoint-initdb.d
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: ${TZ}
  redis:
    image: redis:7.0
    container_name: idolu-redis
    ports:
      - "6379:6379"
    volumes:
      - ./init-docker/redis/data:/data
      - ./init-docker/redis/conf/redis.conf:/usr/local/conf/redis.conf
    restart: always
    command: redis-server /usr/local/conf/redis.conf
